<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
  <a-scene
    vr-mode-ui="enabled: false"
    renderer="colorManagement: true;"
    embedded
    webxr="requiredFeatures: hit-test, local-floor;"
  >

    <a-assets>
      <a-asset-item id="modelo" src="escritorio.glb"></a-asset-item>
    </a-assets>

    <!-- câmera AR -->
    <a-camera></a-camera>

    <!-- modelo (começa invisível) -->
    <a-entity
      id="sala"
      gltf-model="#modelo"
      visible="false"
      scale="1 1 1">
    </a-entity>

  </a-scene>

  <script>
    const scene = document.querySelector("a-scene");
    const sala = document.querySelector("#sala");

    scene.addEventListener("enter-vr", async () => {
      if (!scene.is("ar-mode")) return;

      const xrSession = scene.renderer.xr.getSession();
      const viewerSpace = await xrSession.requestReferenceSpace("viewer");
      const referenceSpace = await xrSession.requestReferenceSpace("local-floor");
      const hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

      scene.renderer.xr.addEventListener("frame", (event) => {
        const frame = event.frame;
        const hitTestResults = frame.getHitTestResults(hitTestSource);

        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const pose = hit.getPose(referenceSpace);

          // Quando tocar na tela, posiciona
          window.addEventListener("click", () => {
            sala.setAttribute("position", {
              x: pose.transform.position.x,
              y: pose.transform.position.y,
              z: pose.transform.position.z
            });

            sala.setAttribute("visible", true);
          }, { once: true });
        }
      });
    });
  </script>

</body>
</html>
